name: "Setup Bun"
description: "Installs Bun and caches Bun package dependencies"
runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: bundeps-${{ runner.os }}-${{ runner.arch }}-
        path: ~/.bun/install/cache
