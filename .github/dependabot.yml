version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "cargo"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "bun"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /build-scripts
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /src-ui
    schedule:
      interval: daily
