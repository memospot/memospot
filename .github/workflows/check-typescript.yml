name: Check (TypeScript)

on:
  merge_group:
  pull_request:
    paths:
      - "**/check-typescript.yml"
      - "**/bun.lock"
      - "**/bunfig.toml"
      - "**/biome.jsonc"
      - "**/*.{svelte,ts}"
  push:
    paths:
      - "**/check-typescript.yml"
      - "**/bun.lock"
      - "**/bunfig.toml"
      - "**/biome.jsonc"
      - "**/*.{svelte,ts}"

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  biome:
    name: TypeScript lint
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1

      - name: Lint code with Biome
        run: biome ci --css-parse-tailwind-directives=true .

  test:
    name: TypeScript tests
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
          - runner: macos-15
          - runner: windows-2022

    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies with Bun
        shell: bash
        run: |
          pushd ./build-scripts; bun install; popd
          pushd ./src-ui; bun install; popd

      - name: Run Bun tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          pushd ./build-scripts; bun test; popd
          pushd ./src-ui; bun test; popd
