name: Check (Rust)
on:
  merge_group:
  pull_request:
    paths:
      - "**/check-rust.yml"
      - "**/Cargo.lock"
      - "**/Tauri.toml"
      - "**/*.rs"
  push:
    paths:
      - "**/check-rust.yml"
      - "**/Cargo.lock"
      - "**/Tauri.toml"
      - "**/*.rs"
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  CACHE_KEY: NOT_SET
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GLIBC_VERSION: NOT_SET
  RUST_BACKTRACE: short
  RUSTFLAGS: -Copt-level=1 -Cstrip=symbols -Ccodegen-units=256

jobs:
  fmt:
    name: Check Rust code formatting
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "stable"
          components: rustfmt

      - name: Run rustfmt
        run: cargo fmt --all -- --check

  machete:
    name: Check for unused dependencies
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "stable"

      - name: Install cargo-machete
        uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
        with:
          tool: "cargo-machete@0.9.1"

      - name: Run cargo-machete
        run: cargo machete

  lint-and-test:
    name: Rust lint and test
    permissions: { actions: read, contents: read, security-events: write }
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-15, rust_target: aarch64-apple-darwin }
          - { runner: macos-15-intel, rust_target: x86_64-apple-darwin }
          - { runner: ubuntu-22.04, rust_target: x86_64-unknown-linux-gnu }
          - { runner: windows-2022, rust_target: x86_64-pc-windows-msvc }

    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout repository,
        uses: actions/checkout@v6

      - name: "Set env vars"
        shell: bash
        run: |
          echo "CACHE_KEY=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "GLIBC_VERSION=$(ldd --version | head -n 1 | awk '{print $NF}')" >> $GITHUB_ENV

      # Platform deps
      - if: ${{ runner.os == 'Linux'  }}
        name: "[Linux] Setup Ubuntu for Tauri builds"
        uses: ./.github/actions/setup-tauri-ubuntu
        with:
          ubuntu-runner: "${{ matrix.platform.runner }}"

      - if: ${{ runner.os == 'macOS' }}
        name: "[macOS] Install platform dependencies"
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with: { xcode-version: latest-stable }
      # /Platform deps

      # Rust
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: ${{ matrix.platform.rust_target }}

      - name: Setup Cargo cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          prefix-key: cargo
          shared-key: ${{ matrix.platform.runner }}-${{ runner.arch }}${{ runner.os == 'Linux' && format('-glibc{0}', env.GLIBC_VERSION) || '' }}
          key: ${{ matrix.platform.rust_target }}-${{ hashFiles('**/Cargo.lock') }}
      # /Rust

      # Clippy with SARIF output
      - if: ${{ github.event_name == 'pull_request' }}
        name: "Install sarif-fmt and clippy-sarif"
        uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
        with:
          tool: >-
            clippy-sarif@0.8.0
            sarif-fmt@0.8.0

      # Clippy with SARIF output
      - if: ${{ github.event_name == 'pull_request' }}
        name: "[PR] Run clippy with SARIF output"
        shell: bash
        run: |
          cargo clippy --all-features --all-targets --workspace --locked --message-format=json \
            | clippy-sarif \
            | tee clippy-results.sarif
          cat clippy-results.sarif | sarif-fmt --color always

      - if: ${{ github.event_name == 'pull_request' }}
        name: "[PR] Upload SARIF analysis results to GitHub"
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ./clippy-results.sarif
          wait-for-processing: true
      # /Clippy with SARIF output

      - if: ${{ github.event_name != 'pull_request' }}
        name: Run clippy with standard output
        run: cargo clippy --all-features --all-targets --workspace --locked

      - name: Run all Rust tests
        run: cargo test --workspace --lib -- --nocapture
