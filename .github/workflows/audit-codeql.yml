name: Audit (CodeQL)

on:
  merge_group:
  push:
    paths:
      - "**/audit-codeql.yml"
      - "**/bun.lock"
      - "**/bunfig.toml"
      - "**/Cargo.lock"
      - "**/*.{rs,svelte,ts}"
      - "**/workflows/*.yml"
  pull_request:
    paths:
      - "**/audit-codeql.yml"
      - "**/bun.lock"
      - "**/bunfig.toml"
      - "**/Cargo.lock"
      - "**/*.{rs,svelte,ts}"
      - "**/workflows/*.yml"

  schedule:
    - cron: "0 9 */15 * *" # 9 AM, every 15 days
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  analyze:
    name: Analyze with CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
          - rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "${{matrix.language}}"

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
