name: Audit (RustSec)

on:
  merge_group:
  pull_request:
    paths:
      - "**/audit-rust.yml"
      - "**/Cargo.lock"
  push:
    paths:
      - "**/audit-rust.yml"
      - "**/Cargo.lock"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  audit-rust:
    name: Audit with RustSec
    runs-on: ubuntu-latest
    permissions:
      issues: write
      checks: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: "Install cargo-audit"
        uses: taiki-e/install-action@4a136ceac97fe29b942ff3b6c749a46c7950d853
        with:
          tool: "cargo-audit@0.22.0"

      - name: Rust audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
