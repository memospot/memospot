name: Check (formatting)

on:
  merge_group:
  pull_request:
    paths:
      - "**/check-formatting.yml"
      - "**/*.{css,html,md}"
      - "**/*.{rs,svelte,ts}"
      - "**/*.{json,jsonc,toml,yml,yaml}"
      - "!**/gen/schemas/*.json"
  push:
    paths:
      - "**/check-formatting.yml"
      - "**/*.{css,html,md}"
      - "**/*.{rs,svelte,ts}"
      - "**/*.{json,jsonc,toml,yml,yaml}"
      - "!**/gen/schemas/*.json"
    tags-ignore: ["*"]
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  DPRINT_CACHE_DIR: ${{github.workspace}}/.dprint

jobs:
  dprint:
    name: Check formatting with dprint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Ensure LF line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup rustfmt
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dprint
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8
        with:
          repo: dprint/dprint
          tag: 0.52.0
          cache: enable

      - name: Cache dprint plugins
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.DPRINT_CACHE_DIR }}
          key: cache-dprint-${{ hashFiles('**/.dprint.jsonc','.dprint/plugin-cache-manifest.json') }}

      - run: dprint check
